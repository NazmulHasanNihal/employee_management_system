name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Mock values let type-check / build / tests run without a real database.
      NEXT_PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || env.DATABASE_URL }}

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec next lint

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Build Next.js
        run: pnpm run build

  go-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
               working-directory: ./services/go-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Build Go Microservice
        run: go build -v ./...

      - name: Go vet
        run: go vet ./...

  e2e-tests:
    runs-on: ubuntu-latest
    if: ${{ secrets.STAGING_URL != '' && secrets.E2E_EMAIL != '' && secrets.E2E_PASSWORD != '' }}
    env:
      BASE_URL: ${{ secrets.STAGING_URL }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm exec playwright test e2e --project=chromium
